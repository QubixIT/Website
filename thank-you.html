<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent — Qubix IT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#061C3F;
    --secondary:#0E5EFF;
    --accent:#42C6FF;
    --bg:#030712;
    --card:#0B1120;
    --text:#FFFFFF;
    --light-text:#B9D7FF;
    --line: rgba(66,198,255,0.14);
    --mono: 'JetBrains Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
    --body: 'Inter', sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--body);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow:hidden;
  }
  .bg-grid{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 64px 64px;
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 30%, transparent 85%);
            mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, #000 30%, transparent 85%);
    opacity:0.6;
  }
  .glow-orb{
    position:fixed;
    width:520px;height:520px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(14,94,255,0.18) 0%, transparent 70%);
    top:-160px; left:50%;
    transform:translateX(-50%);
    z-index:0;
    pointer-events:none;
  }
  .panel{
    position:relative;
    z-index:1;
    max-width:480px;
    width:100%;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:52px 40px;
    text-align:center;
  }
  .logo{
    height:56px;
    margin:0 auto 28px;
    filter: drop-shadow(0 0 24px rgba(14,94,255,0.4));
  }
  .check{
    width:56px;height:56px;
    margin:0 auto 24px;
    border-radius:50%;
    background:rgba(14,94,255,0.15);
    border:1px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--accent);
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:14px;
  }
  h1{
    font-family:var(--display);
    font-size:clamp(24px,4vw,30px);
    margin-bottom:16px;
    line-height:1.3;
  }
  p{
    color:var(--light-text);
    font-size:15px;
    line-height:1.6;
    margin-bottom:32px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:14px 28px;
    border-radius:6px;
    background:var(--secondary);
    color:#fff;
    text-decoration:none;
    font-weight:600;
    font-size:14px;
    transition:background .2s ease, transform .2s ease;
  }
  .btn:hover{ background:#1a6bff; transform:translateY(-2px); }
  .slogan{
    margin-top:28px;
    font-family:var(--mono);
    font-size:12px;
    color:var(--light-text);
    letter-spacing:0.05em;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow-orb"></div>

<div class="panel">
  <img class="logo" src="logo.png" alt="Qubix IT logo">
  <div class="check">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
  </div>
  <div class="eyebrow">Message Received</div>
  <h1>Thanks for reaching out.</h1>
  <p>Your message has landed in our inbox. Our team will get back to you within one business day.</p>
  <a href="https://www.qubix.it.com/" class="btn">Back to Qubix IT</a>
  <div class="slogan">"We see what others miss"</div>
</div>

</body>
</html>
